<!-- index.html - Premium Cyberpunk Dashboard & Settings Modal Overlay -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void-Tunnel Operator Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dynamic Grid Backdrop -->
  <div class="grid-backdrop"></div>
  <div class="hud-scanner-line"></div>

  <div class="terminal-container">
    
    <!-- Top Tactical Header Bar -->
    <div class="header">
      <div class="hud-brand">
        <h1 id="app-title">VOID-TUNNEL // STANDBY</h1>
      </div>
      <div class="nav-controls">
        <span class="hud-node-ping">SYS_PING: <span id="hud-ping" class="ping-green">32ms</span></span>
        <button id="btn-open-settings" class="gear-btn">⚙️</button>
      </div>
    </div>

    <!-- Main Viewport -->
    <div class="viewport-core">
      <div class="dashboard-segment">
        
        <!-- Central Sphere Connection Trigger -->
        <div class="connect-sphere-container">
          <div class="radar-scan-line"></div>
          <button id="btn-main-connect" class="neon-sphere-btn">
            <div class="sphere-inner">
              <span id="connect-label">INITIATE</span>
            </div>
            <div class="sphere-orbit"></div>
            <div class="sphere-inner-rings"></div>
          </button>
        </div>

        <!-- Connection Readout Panel -->
        <div class="hud-status-card">
          <div class="hud-status-row">
            <span class="status-dot-wrapper">
              <span id="status-indicator" class="status-dot status-dot-inactive"></span>
            </span>
            <span id="status-text" class="hud-status-text">CHANNELS OFFLINE // SECURE LINK INACTIVE</span>
          </div>
        </div>

        <!-- Telemetry Meters -->
        <div class="telemetry-wrapper">
          <div class="metric-bar-group">
            <div class="metric-label-row">
              <span id="lbl-metric-overhead">CLOAKING OVERHEAD (POLYMORPHIC)</span>
              <span id="overhead-percentage">12.4%</span>
            </div>
            <div class="bar-track">
              <div id="metric-overhead-bar" class="bar-fill purple-glow" style="width: 42%;"></div>
            </div>
          </div>

          <div class="metric-bar-group">
            <div class="metric-label-row">
              <span id="lbl-metric-throughput">SECURE DATA THROUGHPUT</span>
              <span id="throughput-speed">0.0 KB/S</span>
            </div>
            <div class="bar-track">
              <div id="metric-throughput-bar" class="bar-fill cyan-glow" style="width: 5%;"></div>
            </div>
          </div>
        </div>

      </div>

      <!-- Glassmorphism Settings Modal Overlay (⚙️ Triggered) -->
      <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
          <div class="modal-header">
            <h2 id="lbl-settings-title">TACTICAL CONFIGURATION PANEL</h2>
            <button id="btn-close-settings" class="btn-close-modal">✖</button>
          </div>

          <div class="modal-body">
            <div class="settings-grid">
              
              <div class="input-box">
                <label id="lbl-lang-select">Select Language</label>
                <select id="lang-selector" class="settings-select">
                  <option value="en">🇬🇧 English</option>
                  <option value="ru">🇷🇺 Русский</option>
                  <option value="zh">🇨🇳 中文</option>
                  <option value="fa">🦁 فارسی</option>
                </select>
              </div>

              <div class="input-box">
                <label id="lbl-evasion-profile">Evasion Profile Strategy</label>
                <select id="region-selector" class="settings-select">
                  <option value="IR">🇮🇷 Iran (Dynamic Fragmentation & Jitter)</option>
                  <option value="CN">🇨🇳 China (JA4 TLS Spoofing & Decoy)</option>
                  <option value="RU">🇷🇺 Russia (Asynchronous QUIC Cloaking)</option>
                  <option value="DEFAULT">🌐 Standard Balanced Protection</option>
                </select>
              </div>

              <div class="input-box">
                <label id="lbl-cf-token">Cloudflare API Token</label>
                <input type="password" id="cf-token" placeholder="Paste Edit Workers token">
              </div>

              <div class="input-box">
                <label id="lbl-custom-gateway">Primary Gateway URL (Cloudflare Worker)</label>
                <input type="text" id="custom-gateway" placeholder="Uses public default Anycast node if empty">
              </div>

              <div class="input-box">
                <label id="lbl-mac-spoof">Spoofed MAC Address (Router Bypass)</label>
                <div class="key-generator-row">
                  <input type="text" id="mac-address" placeholder="00:1A:2B:3C:4D:5E">
                  <button id="btn-gen-mac" class="btn-regen">GENERATE</button>
                </div>
              </div>

              <div class="input-box">
                <label id="lbl-sni-bypass">Domestic SNI Bypass (Local Fronting Host)</label>
                <input type="text" id="fronting-mirror" placeholder="e.g. domestic-news-portal.ir">
              </div>

              <div class="input-box full-width">
                <label id="lbl-hmac-key">HMAC Key Hex (ChaCha20 symmetric secret key)</label>
                <div class="key-generator-row">
                  <input type="text" id="hmac-key" readonly placeholder="Generating cryptographic key...">
                  <button id="btn-regen-key" class="btn-regen">REGENERATE KEY</button>
                </div>
              </div>

            </div>

            <div class="killswitch-panel-wrapper">
              <label class="neon-checkbox-container">
                <input type="checkbox" id="chk-killswitch">
                <span class="checkbox-checkmark"></span>
                <span id="lbl-killswitch-text">Enable Kernel Kill Switch (Halt system traffic instantly on drop)</span>
              </label>
            </div>

            <div class="modal-footer-actions">
              <button id="btn-deploy" class="btn-deploy-purple">1-CLICK AUTO DEPLOY</button>
              <button id="btn-save-settings" class="btn-save-cyan">SAVE & APPLY CHANGES</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Live Operator Console Output -->
    <div class="logging-area">
      <div class="console-title-row">
        <span class="console-icon">█</span>
        <h3 id="lbl-logs">TACTICAL CONSOLE LOGS</h3>
      </div>
      <div id="log-output" class="log-console">
        [SYSTEM] Interface initialized. Standby for link initiation...
      </div>
    </div>

  </div>

  <script type="module" src="main.ts"></script>
</body>
</html>
